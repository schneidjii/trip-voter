<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schneider Family Trip Voter</title>
<style>
  :root{
    --forest:#1f3d2b; --pine:#2c5f3f; --moss:#7fa66a; --gold:#e8b04b;
    --cream:#f6f2e9; --ink:#22271f; --line:#dfe0d4; --muted:#6c7166;
    --hard:#c1462f; --add:#3f7a52; --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;background:var(--cream);
    color:var(--ink);line-height:1.35;padding:14px;max-width:780px;margin:0 auto}
  .header{margin-bottom:12px}
  .title{font-size:1.5rem;font-weight:800;color:var(--forest)}
  .subtitle{font-size:.82rem;color:var(--muted);margin-top:2px}
  .tabs{display:flex;gap:8px;margin-top:14px}
  .tab{flex:1;padding:11px 8px;border:1px solid var(--line);background:#fff;border-radius:12px;
    font-size:.95rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
  .tab.active{background:var(--forest);color:#fff;border-color:var(--forest)}
  .name-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
  .name-label{font-weight:700;font-size:.9rem}
  .name-input{flex:1;min-width:130px;padding:9px 12px;border:2px solid var(--gold);border-radius:10px;
    font-size:1rem;background:#fff}
  .status{font-size:.72rem;font-weight:700;padding:3px 8px;border-radius:99px}
  .status.on{color:#1f7a3d;background:#e4f3e9}
  .status.off{color:#9a7b1e;background:#f6eecf}
  .view-toggle{display:flex;gap:6px;margin-top:12px;background:#eae6d9;padding:4px;border-radius:12px}
  .vt{flex:1;padding:8px;border:none;background:transparent;border-radius:9px;font-weight:700;
    font-size:.9rem;color:var(--muted);cursor:pointer}
  .vt.active{background:#fff;color:var(--forest);box-shadow:0 1px 4px rgba(0,0,0,.1)}
  .legend{font-size:.7rem;color:var(--muted);margin-top:10px;padding:2px}
  .content{margin-top:8px}
  .notice{background:#fff;border:1px dashed var(--gold);border-radius:12px;padding:14px;font-size:.9rem}
  .progress{font-size:.82rem;color:var(--muted);font-weight:600;padding:6px 2px 10px}
  .group{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .gsummary{padding:12px 14px;font-weight:800;color:var(--forest);cursor:pointer;font-size:.98rem;
    list-style:none;background:#fbfaf5}
  .gsummary::-webkit-details-marker{display:none}
  .gsummary::before{content:'▸ ';color:var(--moss)}
  details[open] .gsummary::before{content:'▾ '}
  .rows{padding:2px 0}
  .pcell{border-top:1px solid #f0efe6}
  .prow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px}
  .pleft{display:flex;align-items:flex-start;gap:9px;flex:1;min-width:0}
  .info-btn{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:1px solid var(--line);
    background:#fff;color:var(--moss);font-size:.95rem;font-weight:700;cursor:pointer;line-height:1;padding:0}
  .info-btn.open{background:var(--moss);color:#fff;border-color:var(--moss)}
  .pinfo{flex:1;min-width:0}
  .pname-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .pname{font-weight:600;font-size:.96rem}
  .pnote{font-size:.76rem;color:var(--muted);margin-top:1px}
  .prov{font-size:.8rem;font-weight:800;color:#b9a25a;cursor:help}
  .prov2{color:#c98a3e}
  .badge{font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:6px;white-space:nowrap}
  .badge-hard{background:var(--hard);color:#fff}
  .scores{display:flex;gap:4px;flex-shrink:0}
  .score{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;
    font-weight:700;font-size:.9rem;color:var(--muted);cursor:pointer;transition:.12s}
  .score:hover{border-color:var(--moss)}
  .score.picked{background:var(--gold);border-color:var(--gold);color:#3a2e10;transform:scale(1.06)}
  .info-panel{display:flex;gap:12px;padding:0 14px 14px 49px;flex-wrap:wrap}
  .info-img{width:150px;height:100px;border-radius:10px;overflow:hidden;background:#eee;flex-shrink:0;
    display:flex;align-items:center;justify-content:center}
  .info-img.loading-img{background:linear-gradient(90deg,#eee,#f6f6f6,#eee)}
  .info-img.no-img{background:#e6efe8}
  .no-img-txt{font-size:1.8rem;opacity:.5}
  .wimg{width:100%;height:100%;object-fit:cover;display:block}
  .info-body{flex:1;min-width:200px;font-size:.85rem}
  .info-what{color:var(--ink);margin-bottom:8px;line-height:1.4}
  .wlink{color:var(--pine);font-weight:600;text-decoration:none;white-space:nowrap}
  .info-love,.info-caution{display:flex;gap:7px;margin-top:5px;align-items:baseline}
  .lbl{font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0}
  .lbl-love{background:#e6f0e9;color:var(--add)}
  .lbl-caution{background:#f6ecd6;color:#9a7b1e}
  .info-love-txt,.info-caution-txt{color:#3c4139}
  .results-head{font-size:.82rem;color:var(--muted);font-weight:600;padding:4px 2px 10px}
  .abtally{display:flex;align-items:stretch;gap:8px;margin-bottom:14px}
  .ab{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
  .ab.win{border-color:var(--gold);box-shadow:0 2px 10px rgba(232,176,75,.3)}
  .ab-lbl{font-size:.74rem;font-weight:700;color:var(--muted)}
  .ab-avg{font-size:1.6rem;font-weight:800;color:var(--forest);margin-top:2px}
  .ab-vs{display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;
    color:var(--pine);text-align:center;width:90px;flex-shrink:0}
  .copy-btn{width:100%;padding:11px;border:1px solid var(--pine);background:#fff;color:var(--pine);
    border-radius:10px;font-weight:700;font-size:.9rem;cursor:pointer;margin-bottom:12px}
  .copy-btn:hover{background:var(--pine);color:#fff}
  .copy-fallback{width:100%;height:120px;margin-bottom:10px;font-size:.75rem;padding:8px;border-radius:8px;border:1px solid var(--line)}
  .rank-list{display:flex;flex-direction:column;gap:8px}
  .rank-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:10px 12px}
  .rank-num{font-size:1rem;font-weight:800;color:var(--moss);width:26px;text-align:center;flex-shrink:0}
  .rank-main{flex:1;min-width:0}
  .rank-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .rank-name{font-weight:700;font-size:.95rem}
  .rank-state{font-size:.72rem;color:var(--muted)}
  .bar{height:7px;background:#eee;border-radius:99px;margin-top:6px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--moss),var(--gold));border-radius:99px}
  .rank-score{text-align:right;flex-shrink:0;min-width:52px}
  .rank-avg{font-size:1.15rem;font-weight:800;color:var(--forest)}
  .rank-count{font-size:.68rem;color:var(--muted)}
  .footer{text-align:center;font-size:.7rem;color:var(--muted);padding:16px 0 4px}
  .title{cursor:default;user-select:none}
  /* parent bar */
  .parent-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-top:10px;padding:8px 10px;background:#1f3d2b;border-radius:10px;flex-wrap:wrap}
  .parent-tag{color:#e8b04b;font-weight:700;font-size:.8rem}
  .reveal-btn{background:var(--gold);color:#3a2e10;border:none;border-radius:8px;padding:8px 12px;
    font-weight:800;font-size:.82rem;cursor:pointer}
  .reveal-btn.hide{background:#caa; color:#4a1f1f}
  .vt-parent.active{background:#1f3d2b;color:#fff}
  /* PIN pad */
  .pin-overlay{position:fixed;inset:0;background:rgba(20,24,18,.7);display:flex;align-items:center;
    justify-content:center;z-index:100;padding:20px}
  .pin-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:280px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .pin-title{font-weight:800;color:var(--forest);margin-bottom:12px}
  .pin-display{font-size:1.3rem;letter-spacing:4px;min-height:32px;color:var(--ink);margin-bottom:12px;
    font-weight:700}
  .pin-display.err{color:var(--hard);letter-spacing:normal;font-size:1rem}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .pin-key{padding:14px;border:1px solid var(--line);background:#fbfaf5;border-radius:10px;
    font-size:1.1rem;font-weight:700;cursor:pointer}
  .pin-key.ok{background:var(--forest);color:#fff;border-color:var(--forest)}
  .pin-key.clr{background:#f0e6e6}
  .pin-cancel{margin-top:12px;background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:.85rem;text-decoration:underline}
  /* grid */
  .grid-controls{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .grid-hint{font-size:.78rem;color:var(--muted);font-weight:600}
  .grid-sort{border:1px solid var(--pine);background:#fff;color:var(--pine);border-radius:8px;
    padding:7px 11px;font-weight:700;font-size:.8rem;cursor:pointer}
  .grid-sort.on{background:var(--pine);color:#fff}
  .grid-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
  .grid-table{border-collapse:collapse;font-size:.8rem;width:100%}
  .grid-table th,.grid-table td{border:1px solid #eee;text-align:center;padding:5px 6px;white-space:nowrap}
  .gh{background:#f3f0e6;font-weight:800;color:var(--forest);position:sticky;top:0;font-size:.72rem}
  .gh-place,.gc-place{text-align:left;position:sticky;left:0;background:#fbfaf5;z-index:2;max-width:170px;
    white-space:normal}
  .gh-place{z-index:3}
  .gc-name{font-weight:600;font-size:.78rem}
  .gc-voter{max-width:70px;overflow:hidden;text-overflow:ellipsis}
  .gc-score{font-weight:700;color:#2a2a2a}
  .gc-empty{color:#ccc;background:#fafafa}
  .gc-avg{font-weight:800;color:var(--forest);background:#f7f5ee}
  .gc-ctrl.hot{background:#fde2da}
  .gc-ctrl.warm{background:#fbf1d8}
  .gc-ctrl.cool{background:#e7f2e7}
  .grid-key{font-size:.68rem;color:var(--muted);margin-top:8px;padding:2px}
</style>
</head>

    return String(name).trim().replace(/[.$#\[\]\/\x00-\x1F\x7F]/g, "_").slice(0, 60) || "anon";
  }
  function safeLocalGet(k) {
    try { return window.localStorage.getItem(k); } catch (e) { return null; }
  }
  function safeLocalSet(k, v) {
    try { window.localStorage.setItem(k, v); } catch (e) { /* artifact sandbox blocks this; fine */ }
  }

  // ---------- FIREBASE ----------
  var db = null;
  function initFirebase() {
    if (!window._fbReady || !window._fbReady.db) return false;
    db = window._fbReady.db;
    state.connected = true;
    ["summer", "west"].forEach(function (trip) {
      db.ref("tripVoter/votes/" + trip).on("value", function (snap) {
        state.allVotes[trip] = snap.val() || {};
        // refresh my own votes from server truth
        var mk = sanitizeKey(state.voter);
        if (state.voter && state.allVotes[trip][mk]) {
          state.myVotes[trip] = Object.assign({}, state.allVotes[trip][mk]);
        }
        if (state.trip === trip) render();
      }, function (err) {
        state.connected = false;
        render();
      });
    });
    // global reveal flag
    db.ref("tripVoter/config/revealed").on("value", function (snap) {
      state.revealed = snap.val() === true;
      render();
    });
    return true;
  }

  function setRevealed(val) {
    state.revealed = val;
    if (db) db.ref("tripVoter/config/revealed").set(val === true);
    render();
  }

  function writeVote(trip, placeId, score) {
    var mk = sanitizeKey(state.voter);
    // optimistic local
    if (score == null) delete state.myVotes[trip][placeId];
    else state.myVotes[trip][placeId] = score;
    if (db && state.voter) {
      var ref = db.ref("tripVoter/votes/" + trip + "/" + mk + "/" + placeId);
      if (score == null) ref.remove();
      else ref.set(score);
    }
  }

  // ---------- WIKIPEDIA (live, in-browser) ----------
  function loadWiki(title, cb) {
    if (state.wikiCache[title]) { cb(state.wikiCache[title]); return; }
    fetch("https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title), { headers: { "Accept": "application/json" } })
      .then(function (r) { if (!r.ok) throw new Error("http"); return r.json(); })
      .then(function (d) {
        var out = {
          img: (d.originalimage && d.originalimage.source) || (d.thumbnail && d.thumbnail.source) || null,
          extract: d.extract || "",
          url: (d.content_urls && d.content_urls.desktop && d.content_urls.desktop.page) || ("https://en.wikipedia.org/wiki/" + encodeURIComponent(title))
        };
        state.wikiCache[title] = out;
        cb(out);
      })
      .catch(function () {
        var out = { img: null, extract: "", url: "https://en.wikipedia.org/wiki/" + encodeURIComponent(title) };
        state.wikiCache[title] = out;
        cb(out);
      });
  }

  // ---------- DOM HELPERS ----------
  function el(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === "class") n.className = attrs[k];
      else if (k === "text") n.textContent = attrs[k];
      else if (k === "html") { /* intentionally unused */ }
      else if (k.indexOf("on") === 0 && typeof attrs[k] === "function") n.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
    });
    if (kids) kids.forEach(function (c) { if (c) n.appendChild(c); });
    return n;
  }
  function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
  function root() { return document.getElementById("app"); }

  // ---------- PROVENANCE MARK ----------
  function provMark(tag) {
    if (tag === "hard") return el("span", { class: "badge badge-hard", text: "★ LOCKED" });
    if (tag === "hers") return el("span", { class: "prov", title: "On Mom's list", text: "*" });
    if (tag === "mentioned") return el("span", { class: "prov prov2", title: "Dad called this out", text: "**" });
    return null; // 'add' = no mark
  }

  // ---------- HEADER ----------
  function renderHeader() {
    var tabs = el("div", { class: "tabs" }, [
      el("button", { class: "tab" + (state.trip === "summer" ? " active" : ""), onclick: function () { setTrip("summer"); } }, [el("span", { text: "🚗 This Summer" })]),
      el("button", { class: "tab" + (state.trip === "west" ? " active" : ""), onclick: function () { setTrip("west"); } }, [el("span", { text: "🏔 Next Year (West)" })])
    ]);

    var nameInput = el("input", {
      class: "name-input", type: "text", placeholder: "type your name…", value: state.voter,
      oninput: function (e) { state.voter = e.target.value; },
      onchange: function () {
        state.voter = state.voter.trim();
        safeLocalSet("tv_name", state.voter);
        var mk = sanitizeKey(state.voter);
        ["summer", "west"].forEach(function (t) {
          state.myVotes[t] = (state.allVotes[t] && state.allVotes[t][mk]) ? Object.assign({}, state.allVotes[t][mk]) : {};
        });
        render();
      }

      el("label", { class: "name-label", text: "I am:" }), nameInput, status
    ]);

    // View toggle depends on reveal state + parent unlock.
    // Public sees Results only after reveal. Parent (PIN) always sees Grid + can reveal.
    var toggleKids = [
      el("button", { class: "vt" + (state.view === "vote" ? " active" : ""), onclick: function () { state.view = "vote"; render(); } }, [el("span", { text: "Vote" })])
    ];

    }
    if (state.parentUnlocked) {
      toggleKids.push(el("button", { class: "vt" + (state.view === "results" ? " active" : ""), onclick: function () { state.view = "results"; render(); } }, [el("span", { text: "Ranked" })]));
      toggleKids.push(el("button", { class: "vt vt-parent" + (state.view === "grid" ? " active" : ""), onclick: function () { state.view = "grid"; render(); } }, [el("span", { text: "🔒 Grid" })]));
    }
    var viewToggle = el("div", { class: "view-toggle" }, toggleKids);

    var legend = el("div", { class: "legend", text: "★ locked  ·  * on Mom's list  ·  ** Dad's pick  ·  tap ⓘ to learn about a place" });

    // Secret entry: tap the title 5x quickly to open the PIN pad.
    var title = el("h1", { class: "title", text: "Schneider Family Trip Voter" });
    title.addEventListener("click", function () {
      if (state.parentUnlocked) return;
      state.titleTaps++;
      if (state.titleTapTimer) clearTimeout(state.titleTapTimer);
      state.titleTapTimer = setTimeout(function () { state.titleTaps = 0; }, 1200);
      if (state.titleTaps >= 5) {
        state.titleTaps = 0;
        state.showPinPad = true;

    if (state.parentUnlocked) {
      kids.push(el("div", { class: "parent-bar" }, [
        el("span", { class: "parent-tag", text: "👑 Parent view unlocked" }),
        state.revealed
          ? el("button", { class: "reveal-btn hide", onclick: function () { setRevealed(false); } }, [el("span", { text: "Hide results from everyone" })])
          : el("button", { class: "reveal-btn", onclick: function () { setRevealed(true); } }, [el("span", { text: "📣 Reveal results to everyone" })])
      ]));
    }
    return el("div", { class: "header" }, kids);
  }

  // ---------- PIN PAD ----------
  function renderPinPad() {
    var overlay = el("div", { class: "pin-overlay" });
    var display = el("div", { class: "pin-display", text: "" });
    var entered = "";
    function refresh() { display.textContent = entered.replace(/./g, "•") || "enter PIN"; }
    refresh();
    var pad = el("div", { class: "pin-grid" });
    ["1","2","3","4","5","6","7","8","9","clr","0","ok"].forEach(function (k) {
      var b = el("button", { class: "pin-key" + (k === "ok" ? " ok" : k === "clr" ? " clr" : ""), text: k === "clr" ? "⌫" : k === "ok" ? "OK" : k });
      b.addEventListener("click", function () {
        if (k === "clr") { entered = entered.slice(0, -1); refresh(); return; }
        if (k === "ok") {
          if (entered === PARENT_PIN) {
            state.parentUnlocked = true; state.showPinPad = false; state.view = "grid"; render();
          } else {
            state.pinError = true; entered = ""; refresh();
            display.textContent = "wrong PIN"; display.classList.add("err");
          }
          return;
        }
        if (entered.length < 8) { entered += k; refresh(); display.classList.remove("err"); }
      });
      pad.appendChild(b);
    });
    var box = el("div", { class: "pin-box" }, [
      el("div", { class: "pin-title", text: "Parent access" }),
      display, pad,
      el("button", { class: "pin-cancel", onclick: function () { state.showPinPad = false; render(); } }, [el("span", { text: "Cancel" })])
    ]);
    overlay.appendChild(box);
    return overlay;
  }

  // ---------- INFO PANEL ----------
  function buildInfoPanel(place) {
    var panel = el("div", { class: "info-panel" });
    var imgWrap = el("div", { class: "info-img loading-img" });
    var body = el("div", { class: "info-body" }, [
      el("div", { class: "info-what", text: "Loading…" }),
      el("div", { class: "info-love" }, [ el("span", { class: "lbl lbl-love", text: "❤ Love it" }), el("span", { class: "info-love-txt", text: place.love || "" }) ]),
      el("div", { class: "info-caution" }, [ el("span", { class: "lbl lbl-caution", text: "⚠ Or skip it" }), el("span", { class: "info-caution-txt", text: place.caution || "" }) ])
    ]);
    panel.appendChild(imgWrap);
    panel.appendChild(body);

    loadWiki(place.wiki, function (w) {
      imgWrap.classList.remove("loading-img");
      if (w.img) {
        var im = el("img", { class: "wimg", src: w.img, alt: place.name, loading: "lazy" });
        imgWrap.appendChild(im);
      } else {
        imgWrap.classList.add("no-img");
        imgWrap.appendChild(el("span", { class: "no-img-txt", text: "🏞" }));
      }
      var what = body.querySelector(".info-what");
      var extract = w.extract ? (w.extract.length > 260 ? w.extract.slice(0, 257) + "…" : w.extract) : "A memorable stop on the route.";
      clear(what);
      what.appendChild(document.createTextNode(extract + " "));
      what.appendChild(el("a", { class: "wlink", href: w.url, target: "_blank", rel: "noopener", text: "Wikipedia ↗" }));
    });
    return panel;
  }

  // ---------- SCORE BUTTONS ----------
  function scoreButtons(place) {
    var current = state.myVotes[state.trip][place.id] || 0;
    var wrap = el("div", { class: "scores" });
    for (var s = 1; s <= 5; s++) (function (score) {
      var b = el("button", { class: "score" + (current === score ? " picked" : ""), text: String(score), title: score === 1 ? "meh" : score === 5 ? "must-see" : "" });
      b.addEventListener("click", function () {
        if (state.myVotes[state.trip][place.id] === score) writeVote(state.trip, place.id, null);
        else writeVote(state.trip, place.id, score);
        render();
      });
      wrap.appendChild(b);
    })(s);
    return wrap;
  }

  // ---------- VOTE VIEW ----------
  function renderVote() {
    var trip = DATA[state.trip];
    var container = el("div", { class: "content" });

    if (!state.voter) {
      container.appendChild(el("div", { class: "notice", text: "👆 Enter your name above to start. Score each place 1 (meh) to 5 (must-see). Skip anything you don't care about, and tap a number again to clear it. Not sure what a place is? Tap ⓘ." }));
    } else {
      var total = 0, done = 0;
      trip.groups.forEach(function (g) { g.places.forEach(function () { total++; }); });
      Object.keys(state.myVotes[state.trip]).forEach(function () { done++; });
      container.appendChild(el("div", { class: "progress", text: state.voter + " — scored " + done + " of " + total }));
    }

    trip.groups.forEach(function (g) {
      var rows = el("div", { class: "rows" });
      g.places.forEach(function (p) {
        var infoBtn = el("button", { class: "info-btn" + (state.openInfo[p.id] ? " open" : ""), text: "ⓘ", title: "Learn about " + p.name });
        infoBtn.addEventListener("click", function () {
          state.openInfo[p.id] = !state.openInfo[p.id];
          render();
        });
        var nameRow = el("div", { class: "pname-row" }, [ el("span", { class: "pname", text: p.name }), provMark(p.tag) ]);
        var info = el("div", { class: "pinfo" }, [ nameRow, p.note ? el("div", { class: "pnote", text: p.note }) : null ]);
        var topRow = el("div", { class: "prow" }, [ el("div", { class: "pleft" }, [infoBtn, info]), scoreButtons(p) ]);
        var cell = el("div", { class: "pcell" }, [topRow]);
        if (state.openInfo[p.id]) cell.appendChild(buildInfoPanel(p));
        rows.appendChild(cell);
      });
      var det = el("details", { class: "group" }, [ el("summary", { class: "gsummary", text: g.state + "  (" + g.places.length + ")" }), rows ]);
      det.open = true;
      container.appendChild(det);
    });
    return container;
  }

  // ---------- RESULTS ----------
  function aggregate(trip) {
    var votes = state.allVotes[trip] || {};
    var agg = {}, voters = {};
    Object.keys(votes).forEach(function (vk) {
      voters[vk] = true;
      var obj = votes[vk] || {};
      Object.keys(obj).forEach(function (pid) {
        var sc = Number(obj[pid]);
        if (!sc) return;
        if (!agg[pid]) agg[pid] = { sum: 0, count: 0 };
        agg[pid].sum += sc; agg[pid].count += 1;
      });
    });
    return { agg: agg, voterCount: Object.keys(voters).length };
  }

  function metaLookup(trip) {
    var meta = {};
    DATA[trip].groups.forEach(function (g) { g.places.forEach(function (p) { meta[p.id] = { name: p.name, state: g.state, tag: p.tag, region: p.region }; }); });
    return meta;
  }

  function renderResults() {
    var container = el("div", { class: "content" });
    var res = aggregate(state.trip);
    var meta = metaLookup(state.trip);

    container.appendChild(el("div", { class: "results-head", text: "Ranked by average score · " + res.voterCount + " voter(s)" }));

    // Plan A/B tally for west
    if (state.trip === "west") {
      var zone = { sw: { s: 0, c: 0 }, north: { s: 0, c: 0 } };
      Object.keys(res.agg).forEach(function (pid) {
        var m = meta[pid]; if (!m) return;
        var a = res.agg[pid];
        if (m.region === "sw") { zone.sw.s += a.sum; zone.sw.c += a.count; }
        else if (m.region === "north") { zone.north.s += a.sum; zone.north.c += a.count; }
      });
      var swAvg = zone.sw.c ? (zone.sw.s / zone.sw.c) : 0;
      var noAvg = zone.north.c ? (zone.north.s / zone.north.c) : 0;
      var lead = swAvg === noAvg ? "tied" : (swAvg > noAvg ? "Plan A (Southwest) leads" : "Plan B (Northern) leads");
      var tally = el("div", { class: "abtally" }, [
        el("div", { class: "ab ab-a" + (swAvg >= noAvg && swAvg > 0 ? " win" : "") }, [ el("div", { class: "ab-lbl", text: "Plan A · Southwest" }), el("div", { class: "ab-avg", text: swAvg ? swAvg.toFixed(2) : "—" }) ]),
        el("div", { class: "ab-vs", text: lead }),
        el("div", { class: "ab ab-b" + (noAvg > swAvg ? " win" : "") }, [ el("div", { class: "ab-lbl", text: "Plan B · Northern" }), el("div", { class: "ab-avg", text: noAvg ? noAvg.toFixed(2) : "—" }) ])
      ]);
      container.appendChild(tally);
    }

    var ranked = Object.keys(res.agg).map(function (pid) {
      var a = res.agg[pid];
      return { id: pid, avg: a.sum / a.count, count: a.count, meta: meta[pid] || { name: pid, state: "" } };
    }).sort(function (x, y) { return (y.avg - x.avg) || (y.count - x.count); });

    if (ranked.length === 0) {
      container.appendChild(el("div", { class: "notice", text: "No votes yet. Switch to Vote, make sure everyone's entered a name, and score some places." }));
      return container;
    }

    // copy button
    var copyBtn = el("button", { class: "copy-btn", text: "📋 Copy ranked list" });
    copyBtn.addEventListener("click", function () {
      var lines = [DATA[state.trip].label + " — ranked (" + res.voterCount + " voters)"];
      ranked.forEach(function (r, i) { lines.push((i + 1) + ". " + r.meta.name + " (" + r.meta.state + ") — avg " + r.avg.toFixed(1) + " / " + r.count + " votes"); });
      var text = lines.join("\n");
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () { copyBtn.textContent = "✓ Copied!"; setTimeout(function () { copyBtn.textContent = "📋 Copy ranked list"; }, 1800); });
        } else { throw new Error("no clipboard"); }
      } catch (e) {
        // fallback: show a textarea to copy manually
        var ta = el("textarea", { class: "copy-fallback" });
        ta.value = text; container.insertBefore(ta, list); ta.select();
      }
    });
    container.appendChild(copyBtn);

    var list = el("div", { class: "rank-list" });
    ranked.forEach(function (r, i) {
      var bar = el("div", { class: "bar" }, [el("div", { class: "bar-fill" })]);
      bar.firstChild.style.width = ((r.avg / 5) * 100).toFixed(0) + "%";
      var nameRow = el("div", { class: "rank-name-row" }, [
        el("span", { class: "rank-name", text: r.meta.name }),
        r.meta.tag === "hard" ? el("span", { class: "badge badge-hard", text: "★" }) : null,
        r.meta.tag === "hers" ? el("span", { class: "prov", text: "*" }) : null,
        r.meta.tag === "mentioned" ? el("span", { class: "prov prov2", text: "**" }) : null,
        el("span", { class: "rank-state", text: r.meta.state })
      ]);
      list.appendChild(el("div", { class: "rank-row" }, [
        el("div", { class: "rank-num", text: String(i + 1) }),
        el("div", { class: "rank-main" }, [nameRow, bar]),
        el("div", { class: "rank-score" }, [ el("div", { class: "rank-avg", text: r.avg.toFixed(1) }), el("div", { class: "rank-count", text: r.count + " vote" + (r.count === 1 ? "" : "s") }) ])
      ]));
    });
    container.appendChild(list);
    return container;
  }

  // ---------- GRID / MATRIX (parent-only) ----------
  function stddev(arr) {
    if (arr.length < 2) return 0;
    var m = arr.reduce(function (a, b) { return a + b; }, 0) / arr.length;
    var v = arr.reduce(function (a, b) { return a + (b - m) * (b - m); }, 0) / arr.length;
    return Math.sqrt(v);
  }
  function scoreColor(s) {
    // 1 red → 5 green
    var colors = { 1: "#e07a5f", 2: "#e8a86b", 3: "#e8c86b", 4: "#a8c67a", 5: "#6fae6f" };
    return colors[s] || "#eee";
  }
  function renderGrid() {
    var trip = state.trip;
    var votes = state.allVotes[trip] || {};
    var voterKeys = Object.keys(votes);
    var container = el("div", { class: "content" });

    if (voterKeys.length === 0) {
      container.appendChild(el("div", { class: "notice", text: "No votes yet — the grid fills in as people vote." }));
      return container;
    }

    // display names: use the raw key (that's what they typed, sanitized)
    var meta = metaLookup(trip);

    // build rows: one per place that has at least one vote OR keep all? Show all places for completeness.
    var rows = [];
    DATA[trip].groups.forEach(function (g) {
      g.places.forEach(function (p) {
        var scores = [];
        var cells = voterKeys.map(function (vk) {
          var s = votes[vk] && votes[vk][p.id] ? Number(votes[vk][p.id]) : 0;
          if (s) scores.push(s);
          return s;
        });
        var avg = scores.length ? (scores.reduce(function (a, b) { return a + b; }, 0) / scores.length) : 0;
        var ctrl = scores.length >= 2 ? stddev(scores) : 0;
        var spread = scores.length >= 2 ? (Math.max.apply(null, scores) - Math.min.apply(null, scores)) : 0;
        rows.push({ place: p, state: g.state, cells: cells, avg: avg, ctrl: ctrl, spread: spread, n: scores.length });
      });
    });

    if (state.gridSortCtrl) {
      rows = rows.slice().sort(function (a, b) { return b.ctrl - a.ctrl || b.n - a.n; });
    }

    // controls
    var controls = el("div", { class: "grid-controls" }, [
      el("span", { class: "grid-hint", text: voterKeys.length + " voters · " + rows.length + " places" }),
      el("button", { class: "grid-sort" + (state.gridSortCtrl ? " on" : ""), onclick: function () { state.gridSortCtrl = !state.gridSortCtrl; render(); } },
        [el("span", { text: state.gridSortCtrl ? "↩ Sort by state" : "⚡ Sort by controversy" })])
    ]);
    container.appendChild(controls);

    // table
    var table = el("table", { class: "grid-table" });
    var thead = el("tr", {}, [ el("th", { class: "gh gh-place", text: "Place" }) ]);
    voterKeys.forEach(function (vk) { thead.appendChild(el("th", { class: "gh gh-voter", text: vk })); });
    thead.appendChild(el("th", { class: "gh gh-avg", text: "Avg" }));
    thead.appendChild(el("th", { class: "gh gh-ctrl", text: "Split" }));
    table.appendChild(thead);

    rows.forEach(function (r) {
      var tr = el("tr", {});
      var nameCell = el("td", { class: "gc gc-place" }, [
        el("span", { class: "gc-name", text: r.place.name }),
        provMark(r.place.tag)
      ]);
      tr.appendChild(nameCell);
      r.cells.forEach(function (s) {
        var td = el("td", { class: "gc gc-score" }, [ el("span", { text: s ? String(s) : "·" }) ]);
        if (s) td.style.background = scoreColor(s);
        else td.classList.add("gc-empty");
        tr.appendChild(td);
      });
      tr.appendChild(el("td", { class: "gc gc-avg", text: r.avg ? r.avg.toFixed(1) : "–" }));
      // controversy cell: color by spread
      var ctrlClass = "gc gc-ctrl";
      if (r.ctrl >= 1.5) ctrlClass += " hot";
      else if (r.ctrl >= 0.9) ctrlClass += " warm";
      else if (r.n >= 2) ctrlClass += " cool";
      var ctrlTxt = r.n < 2 ? "–" : (r.ctrl >= 1.5 ? "🔥" : r.ctrl >= 0.9 ? "•" : "✓");
      var td = el("td", { class: ctrlClass, title: r.n >= 2 ? ("σ=" + r.ctrl.toFixed(2) + ", range " + r.spread) : "needs 2+ votes" }, [ el("span", { text: ctrlTxt }) ]);
      tr.appendChild(td);
      table.appendChild(tr);
    });

    var scroller = el("div", { class: "grid-scroll" }, [table]);
    container.appendChild(scroller);
    container.appendChild(el("div", { class: "grid-key", text: "🔥 big disagreement · • some spread · ✓ consensus — cell color = score (red 1 → green 5)" }));
    return container;
  }

  // ---------- RENDER ----------
  function render() {
    var r = root();
    clear(r);
    r.appendChild(renderHeader());
    var body;
    if (state.view === "grid" && state.parentUnlocked) body = renderGrid();
    else if (state.view === "results" && (state.revealed || state.parentUnlocked)) body = renderResults();
    else body = renderVote();
    r.appendChild(body);
    if (state.showPinPad) r.appendChild(renderPinPad());
  }

  function setTrip(trip) {
    state.trip = trip;
    var mk = sanitizeKey(state.voter);
    state.myVotes[trip] = (state.allVotes[trip] && state.allVotes[trip][mk]) ? Object.assign({}, state.allVotes[trip][mk]) : (state.myVotes[trip] || {});
    render();
  }

  // ---------- INIT ----------
  function init() {
    var saved = safeLocalGet("tv_name");
    if (saved) state.voter = saved;
    render();
    // try firebase now, and retry once shortly in case SDK/config loads late
    if (!initFirebase()) {
      var tries = 0;
      var iv = setInterval(function () {
        tries++;
        if (initFirebase() || tries > 20) { clearInterval(iv); render(); }
      }, 250);
    }
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();

  window.__tv = { state: state };
})();
  </script>
</body>
</html>
